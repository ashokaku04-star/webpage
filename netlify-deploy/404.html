<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Portal Lost | ASHOKA K U</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #914BF1;
            --secondary: #00D4FF;
            --bg: #080c12;
            --text: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            z-index: 1;
        }
        h1 {
            font-size: 10rem;
            margin: 0;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(145, 75, 241, 0.5));
            animation: glitch 2s infinite;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }
        .btn {
            padding: 1rem 2rem;
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }
        .btn:hover {
            background: var(--secondary);
            color: var(--bg);
            box-shadow: 0 0 30px var(--secondary);
        }
        .bg-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: radial-gradient(circle at 50% 50%, rgba(145, 75, 241, 0.1) 0%, transparent 70%);
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div class="bg-particles"></div>
    <div class="container">
        <h1>404</h1>
        <p>THE NEURAL PORTAL HAS COLLAPSED</p>
        <a href="/" class="btn">RE-ENTER VOID</a>
    </div>
</body>
</html>
